# Railway deploy config for the backend service.
# In the Railway dashboard, set this service's Root Directory to `backend`
# (or the CLI will detect this file if you run `railway up` from inside backend/).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
